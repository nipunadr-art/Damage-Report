<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Damage Report System</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
    body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
    .loading { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 9999; color: white; flex-direction: column; gap: 15px; }
    .loading.active { display: flex; }
    .spinner { animation: spin 1s linear infinite; font-size: 2rem; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .auth-container { display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
    .auth-box { background: white; border-radius: 32px; padding: 48px; width: 100%; max-width: 480px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); }
    .auth-box h2 { margin-bottom: 32px; color: #1e293b; text-align: center; }
    .input-group { margin-bottom: 20px; }
    .input-group label { display: block; margin-bottom: 8px; font-weight: 600; color: #334155; font-size: 0.85rem; }
    .input-group input, .input-group select, .input-group textarea { width: 100%; padding: 12px 16px; border: 2px solid #e2e8f0; border-radius: 16px; font-size: 1rem; }
    .btn-primary { width: 100%; padding: 14px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 16px; font-weight: 600; cursor: pointer; }
    .toggle-auth { text-align: center; margin-top: 20px; color: #667eea; cursor: pointer; }
    .app-container { max-width: 1400px; margin: 0 auto; padding: 20px; display: none; }
    .header { background: white; border-radius: 24px; padding: 20px 28px; margin-bottom: 24px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
    .badge { background: #f1f5f9; padding: 8px 16px; border-radius: 40px; font-weight: 500; }
    .logout-btn { background: #ef4444; padding: 8px 20px; border-radius: 40px; color: white; border: none; cursor: pointer; }
    .mode-tabs { display: flex; gap: 12px; margin-bottom: 24px; }
    .tab-btn { padding: 12px 28px; background: white; border: none; border-radius: 40px; font-weight: 600; cursor: pointer; }
    .tab-btn.active { background: #1e293b; color: white; }
    .card { background: white; border-radius: 24px; padding: 28px; margin-bottom: 24px; }
    .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-bottom: 20px; }
    .photo-upload { border: 2px dashed #cbd5e1; border-radius: 16px; padding: 30px; text-align: center; cursor: pointer; background: #f8fafc; }
    .photo-preview { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 15px; }
    .preview-img { width: 80px; height: 80px; object-fit: cover; border-radius: 8px; }
    .material-row { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 12px; }
    .material-row input { flex: 1; padding: 10px; border: 1px solid #e2e8f0; border-radius: 12px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 12px; text-align: left; border-bottom: 1px solid #e2e8f0; }
    .status-badge { padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; display: inline-block; }
    .status-pending { background: #fef3c7; color: #92400e; }
    .status-approved { background: #d1fae5; color: #065f46; }
    .toast { position: fixed; bottom: 20px; right: 20px; background: #10b981; color: white; padding: 12px 24px; border-radius: 12px; z-index: 1000; }
    .toast.error { background: #ef4444; }
    @media (max-width: 768px) { .auth-box { padding: 32px 24px; } }
  </style>
</head>
<body>

<div class="loading" id="loading">
  <i class="fas fa-spinner spinner"></i>
  <div>Processing...</div>
</div>

<div id="authPage" class="auth-container">
  <div class="auth-box">
    <h2><i class="fas fa-clipboard-list"></i> Damage Report System</h2>
    <div id="loginForm">
      <div class="input-group"><label>Email</label><input type="email" id="loginEmail" placeholder="your@email.com"></div>
      <div class="input-group"><label>Password</label><input type="password" id="loginPassword" placeholder="••••••"></div>
      <button class="btn-primary" onclick="handleLogin()"><i class="fas fa-sign-in-alt"></i> Login</button>
      <div class="toggle-auth" onclick="showRegister()">Don't have an account? Register as Engineer</div>
    </div>
    <div id="registerForm" style="display:none;">
      <div class="input-group"><label>Full Name</label><input type="text" id="regName" placeholder="Ahmed Mohamed"></div>
      <div class="input-group"><label>Email</label><input type="email" id="regEmail" placeholder="ahmed@site.com"></div>
      <div class="input-group"><label>Password</label><input type="password" id="regPassword" placeholder="••••••"></div>
      <button class="btn-primary" onclick="handleRegister()"><i class="fas fa-user-plus"></i> Register as Engineer</button>
      <div class="toggle-auth" onclick="showLogin()">Already have an account? Login</div>
    </div>
  </div>
</div>

<div id="mainApp" class="app-container">
  <div class="header">
    <div><h2><i class="fas fa-hard-hat"></i> AUH01 - Pure Data Centre</h2><small>Yas Island, Abu Dhabi</small></div>
    <div><span class="badge" id="userNameDisplay"></span><button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button></div>
  </div>

  <div class="mode-tabs">
    <button class="tab-btn active" data-mode="engineer"><i class="fas fa-clipboard"></i> Submit Report</button>
    <button class="tab-btn" data-mode="admin" id="adminTabBtn" style="display:none;"><i class="fas fa-user-shield"></i> Admin Panel</button>
  </div>

  <div id="engineerView">
    <div class="card">
      <h3>New Damage Report</h3>
      <form id="damageForm">
        <div class="form-grid">
          <div class="input-group"><label>Reference</label><input type="text" id="refNo" readonly style="background:#f1f5f9;"></div>
          <div class="input-group"><label>Project</label><input type="text" id="projName" value="AUH01 - Pure Data Centre, Yas Island" required></div>
          <div class="input-group"><label>Location *</label><input type="text" id="location" placeholder="DC1 South West" required></div>
          <div class="input-group"><label>Damage Date *</label><input type="date" id="damageDate" required></div>
          <div class="input-group"><label>Time</label><input type="text" id="damageTime" placeholder="After 06:00 pm"></div>
          <div class="input-group"><label>Sub-Contractor</label><input type="text" id="subcon" value="IMA ENGINEERING LLC"></div>
          <div class="input-group"><label>Main Contractor</label><input type="text" id="mainCon" value="Hilal Bil Badi & Partners Contracting Co."></div>
        </div>
        <div class="input-group"><label>Description *</label><textarea id="description" rows="3" required></textarea></div>
        
        <h4>Damaged Materials & Quantities</h4>
        <div id="materialsList">
          <div class="material-row">
            <input type="text" placeholder="Material" class="mat-name" value="Compacted Sub-base Layer">
            <input type="text" placeholder="Quantity" class="mat-qty" value="320">
            <input type="text" placeholder="Unit" class="mat-unit" value="m²">
            <input type="text" placeholder="Cost (AED)" class="mat-cost" value="1850">
            <button type="button" onclick="this.parentElement.remove()" style="background:#ef4444; color:white; border:none; padding:8px 15px; border-radius:8px;">✕</button>
          </div>
        </div>
        <button type="button" onclick="addMaterialRow()" style="margin:10px 0; background:#64748b; padding:10px 20px;"><i class="fas fa-plus"></i> Add Material</button>
        
        <div class="input-group"><label>Photos</label>
          <div class="photo-upload" onclick="document.getElementById('photoInput').click()"><i class="fas fa-cloud-upload-alt"></i> Click to upload</div>
          <input type="file" id="photoInput" multiple accept="image/*" style="display:none" onchange="handlePhotoUpload(this)">
          <div id="photoPreview" class="photo-preview"></div>
        </div>
        
        <div class="input-group"><label>Notes</label><textarea id="notes" rows="2"></textarea></div>
        <button type="submit" style="background:#10b981; width:100%;"><i class="fas fa-paper-plane"></i> Submit Report</button>
      </form>
    </div>
    <div class="card"><h3>My Reports</h3><div id="myReports"></div></div>
  </div>

  <div id="adminView" style="display:none;">
    <div class="card">
      <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
        <h3>All Damage Reports</h3>
        <button onclick="exportAllReports()" style="background:#667eea;"><i class="fas fa-file-pdf"></i> Export All</button>
      </div>
      <div id="adminReports"></div>
    </div>
  </div>
</div>

<script>
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwvYTS4KmY0Ow8CU3Oiwo0tBEVahBSSlKCk1ZKlESZ5ShMxuITb0V1ursB4_kVKOcjGDg/exec';

let currentUser = null;
let currentPhotos = [];

function showToast(msg, isError = false) {
  const toast = document.createElement('div');
  toast.className = `toast ${isError ? 'error' : ''}`;
  toast.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-triangle' : 'fa-check-circle'}"></i> ${msg}`;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 3000);
}

function showLoading(show) {
  document.getElementById('loading').classList.toggle('active', show);
}

function generateRefNo() {
  return `LOR-IMA-PDC-DR-${String(Math.floor(Math.random() * 10000)).padStart(4, '0')}`;
}

async function callAppsScript(action, params = {}) {
  const url = new URL(APPS_SCRIPT_URL);
  url.searchParams.append('action', action);
  Object.keys(params).forEach(key => url.searchParams.append(key, params[key]));
  
  const response = await fetch(url.toString(), {
    method: 'GET',
    mode: 'cors'
  });
  
  const text = await response.text();
  // Handle JSONP response
  const jsonMatch = text.match(/callback_\d+\((.*)\)/);
  if (jsonMatch) {
    return JSON.parse(jsonMatch[1]);
  }
  return JSON.parse(text);
}

// Authentication
async function handleLogin() {
  const email = document.getElementById('loginEmail').value;
  const password = document.getElementById('loginPassword').value;
  
  if (!email || !password) {
    showToast('Please enter email and password', true);
    return;
  }
  
  showLoading(true);
  
  try {
    const result = await callAppsScript('login', { email, password });
    
    if (result.success) {
      currentUser = result.user;
      showMainApp();
      showToast('Login successful!');
    } else {
      showToast(result.message || 'Login failed', true);
    }
  } catch (error) {
    console.error('Login error:', error);
    showToast('Connection error. Please try again.', true);
  }
  
  showLoading(false);
}

async function handleRegister() {
  const name = document.getElementById('regName').value;
  const email = document.getElementById('regEmail').value;
  const password = document.getElementById('regPassword').value;
  
  if (!name || !email || !password) {
    showToast('Please fill all fields', true);
    return;
  }
  
  showLoading(true);
  
  try {
    const result = await callAppsScript('register', { name, email, password, role: 'engineer' });
    
    if (result.success) {
      showToast('Registration successful! Please login.', false);
      showLogin();
    } else {
      showToast(result.message || 'Registration failed', true);
    }
  } catch (error) {
    console.error('Register error:', error);
    showToast('Connection error. Please try again.', true);
  }
  
  showLoading(false);
}

function showRegister() {
  document.getElementById('loginForm').style.display = 'none';
  document.getElementById('registerForm').style.display = 'block';
}

function showLogin() {
  document.getElementById('loginForm').style.display = 'block';
  document.getElementById('registerForm').style.display = 'none';
}

function showMainApp() {
  document.getElementById('authPage').style.display = 'none';
  document.getElementById('mainApp').style.display = 'block';
  document.getElementById('userNameDisplay').innerHTML = `<i class="fas fa-user-circle"></i> ${currentUser.fullName} (${currentUser.role})`;
  document.getElementById('refNo').value = generateRefNo();
  
  if (currentUser.role === 'admin') {
    document.getElementById('adminTabBtn').style.display = 'inline-block';
  }
  
  loadMyReports();
}

function logout() {
  currentUser = null;
  currentPhotos = [];
  document.getElementById('authPage').style.display = 'flex';
  document.getElementById('mainApp').style.display = 'none';
  showLogin();
}

async function loadMyReports() {
  if (!currentUser) return;
  
  const container = document.getElementById('myReports');
  container.innerHTML = '<p>Loading reports...</p>';
  
  try {
    const result = await callAppsScript('getMyReports', { email: currentUser.email });
    
    if (result.success && result.reports) {
      const reports = result.reports;
      if (reports.length === 0) {
        container.innerHTML = '<p>No reports submitted yet.</p>';
        return;
      }
      
      container.innerHTML = `
        <table>
          <thead><tr><th>Ref No</th><th>Date</th><th>Location</th><th>Status</th></tr></thead>
          <tbody>
            ${reports.map(r => `
              <tr>
                <td>${r.refNo}</td>
                <td>${r.damageDate}</td>
                <td>${r.location}</td>
                <td><span class="status-badge ${r.status === 'approved' ? 'status-approved' : 'status-pending'}">${r.status || 'pending'}</span></td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
    } else {
      container.innerHTML = '<p>Error loading reports.</p>';
    }
  } catch (error) {
    console.error('Load reports error:', error);
    container.innerHTML = '<p>Connection error. Please refresh.</p>';
  }
}

async function loadAdminReports() {
  if (currentUser?.role !== 'admin') return;
  
  const container = document.getElementById('adminReports');
  container.innerHTML = '<p>Loading reports...</p>';
  
  try {
    const result = await callAppsScript('getReports', {});
    
    if (result.success && result.reports) {
      const reports = result.reports;
      if (reports.length === 0) {
        container.innerHTML = '<p>No reports submitted yet.</p>';
        return;
      }
      
      container.innerHTML = `
        <table>
          <thead><tr><th>Ref</th><th>Engineer</th><th>Location</th><th>Date</th><th>Status</th><th>Action</th></tr></thead>
          <tbody>
            ${reports.map(r => `
              <tr>
                <td>${r.refNo}</td>
                <td>${r.createdByName}</td>
                <td>${r.location}</td>
                <td>${r.damageDate}</td>
                <td><span class="status-badge ${r.status === 'approved' ? 'status-approved' : 'status-pending'}">${r.status || 'pending'}</span></td>
                <td>${r.status !== 'approved' ? `<button onclick="approveReport('${r.id}')" style="background:#10b981; padding:5px 10px; border:none; border-radius:8px; color:white; cursor:pointer;">Approve</button>` : 'Approved'}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
    } else {
      container.innerHTML = '<p>Error loading reports.</p>';
    }
  } catch (error) {
    console.error('Load admin reports error:', error);
    container.innerHTML = '<p>Connection error.</p>';
  }
}

async function approveReport(reportId) {
  showLoading(true);
  try {
    const result = await callAppsScript('updateReport', { reportId, status: 'approved', comments: 'Approved by admin' });
    if (result.success) {
      showToast('Report approved!');
      loadAdminReports();
      loadMyReports();
    } else {
      showToast('Failed to approve', true);
    }
  } catch (error) {
    showToast('Error approving report', true);
  }
  showLoading(false);
}

// Submit Report
document.getElementById('damageForm')?.addEventListener('submit', async (e) => {
  e.preventDefault();
  
  if (!currentUser) {
    showToast('Please login first', true);
    return;
  }
  
  const materials = [];
  document.querySelectorAll('#materialsList .material-row').forEach(row => {
    const name = row.querySelector('.mat-name')?.value;
    if (name) {
      materials.push({
        name: name,
        qty: row.querySelector('.mat-qty')?.value || '',
        unit: row.querySelector('.mat-unit')?.value || '',
        cost: row.querySelector('.mat-cost')?.value || ''
      });
    }
  });
  
  const reportData = {
    refNo: document.getElementById('refNo').value,
    projName: document.getElementById('projName').value,
    location: document.getElementById('location').value,
    damageDate: document.getElementById('damageDate').value,
    damageTime: document.getElementById('damageTime').value,
    description: document.getElementById('description').value,
    subcon: document.getElementById('subcon').value,
    mainCon: document.getElementById('mainCon').value,
    materials: materials,
    notes: document.getElementById('notes').value,
    photos: currentPhotos,
    createdBy: currentUser.email,
    createdByName: currentUser.fullName
  };
  
  showLoading(true);
  
  try {
    const result = await callAppsScript('submitReport', { data: JSON.stringify(reportData) });
    
    if (result.success) {
      showToast(`Report ${reportData.refNo} submitted successfully!`);
      
      e.target.reset();
      currentPhotos = [];
      document.getElementById('photoPreview').innerHTML = '';
      document.getElementById('refNo').value = generateRefNo();
      
      const container = document.getElementById('materialsList');
      while (container.children.length > 1) container.removeChild(container.lastChild);
      
      loadMyReports();
      if (currentUser.role === 'admin') loadAdminReports();
    } else {
      showToast(result.message || 'Submission failed', true);
    }
  } catch (error) {
    console.error('Submit error:', error);
    showToast('Connection error. Please try again.', true);
  }
  
  showLoading(false);
});

function addMaterialRow() {
  const container = document.getElementById('materialsList');
  const div = document.createElement('div');
  div.className = 'material-row';
  div.innerHTML = `
    <input type="text" placeholder="Material" class="mat-name">
    <input type="text" placeholder="Quantity" class="mat-qty">
    <input type="text" placeholder="Unit" class="mat-unit">
    <input type="text" placeholder="Cost (AED)" class="mat-cost">
    <button type="button" onclick="this.parentElement.remove()" style="background:#ef4444; color:white; border:none; padding:8px 15px; border-radius:8px;">✕</button>
  `;
  container.appendChild(div);
}

function handlePhotoUpload(input) {
  const files = Array.from(input.files);
  if (currentPhotos.length + files.length > 5) {
    showToast('Maximum 5 photos allowed', true);
    return;
  }
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = e => {
      currentPhotos.push(e.target.result);
      updatePhotoPreview();
    };
    reader.readAsDataURL(file);
  });
}

function updatePhotoPreview() {
  const preview = document.getElementById('photoPreview');
  preview.innerHTML = '';
  currentPhotos.forEach((photo, idx) => {
    const div = document.createElement('div');
    div.style.position = 'relative';
    div.innerHTML = `
      <img src="${photo}" class="preview-img">
      <button onclick="removePhoto(${idx})" style="position:absolute; top:-5px; right:-5px; background:#ef4444; color:white; border:none; border-radius:50%; width:20px; height:20px; cursor:pointer;">✕</button>
    `;
    preview.appendChild(div);
  });
}

function removePhoto(idx) {
  currentPhotos.splice(idx, 1);
  updatePhotoPreview();
}

function exportAllReports() {
  showToast('Export feature - Select individual reports', false);
}

// Tab switching
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    if (btn.dataset.mode === 'admin' && currentUser?.role === 'admin') {
      document.getElementById('adminView').style.display = 'block';
      document.getElementById('engineerView').style.display = 'none';
      loadAdminReports();
    } else {
      document.getElementById('adminView').style.display = 'none';
      document.getElementById('engineerView').style.display = 'block';
    }
  });
});

generateRefNo();
</script>
</body>
</html>
