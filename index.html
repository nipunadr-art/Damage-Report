<!DOCTYPE html>
<html>
<head>
    <title>Test Registration</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        .success { color: green; }
        .error { color: red; }
        pre { background: #f0f0f0; padding: 10px; margin: 10px 0; }
        button { margin: 5px; padding: 10px; cursor: pointer; }
        input { padding: 8px; margin: 5px; width: 250px; }
    </style>
</head>
<body>
    <h1>Damage Report System - Test Page</h1>
    
    <div style="border: 1px solid #ccc; padding: 20px; margin: 10px 0;">
        <h2>Register New User</h2>
        <input type="text" id="regName" placeholder="Full Name" value="Nipuna Dulajith"><br>
        <input type="email" id="regEmail" placeholder="Email" value="nipuna@imagineeringuae.com"><br>
        <input type="password" id="regPassword" placeholder="Password" value="Abc@12345"><br>
        <button onclick="register()">Register</button>
    </div>

    <div style="border: 1px solid #ccc; padding: 20px; margin: 10px 0;">
        <h2>Login</h2>
        <input type="email" id="loginEmail" placeholder="Email" value="nipuna@imagineeringuae.com"><br>
        <input type="password" id="loginPassword" placeholder="Password" value="Abc@12345"><br>
        <button onclick="login()">Login</button>
    </div>

    <div style="border: 1px solid #ccc; padding: 20px; margin: 10px 0;">
        <h2>List All Users</h2>
        <button onclick="listUsers()">List Users</button>
    </div>

    <div style="border: 1px solid #ccc; padding: 20px; margin: 10px 0;">
        <h2>Test API</h2>
        <button onclick="testAPI()">Test API Connection</button>
    </div>

    <h3>Results:</h3>
    <pre id="result">Click a button to test...</pre>

    <script>
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyv9Wc1TkKGoja2SjZfh2qYrvJeBxzzKbJ-2jYZL5tfPEPOuxfqnKeV0obPZUysR-i5KA/exec';

        async function callAPI(action, params = {}) {
            const url = new URL(APPS_SCRIPT_URL);
            url.searchParams.append('action', action);
            
            Object.keys(params).forEach(key => {
                if (params[key] !== undefined && params[key] !== null) {
                    url.searchParams.append(key, params[key]);
                }
            });
            
            const response = await fetch(url.toString());
            const text = await response.text();
            return JSON.parse(text);
        }

        async function testAPI() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = 'Testing API connection...\n';
            try {
                const result = await callAPI('test');
                resultDiv.innerHTML = '✅ API Test Result:\n' + JSON.stringify(result, null, 2);
            } catch (error) {
                resultDiv.innerHTML = '❌ Error: ' + error.message;
            }
        }

        async function register() {
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = 'Registering...\n';
            
            try {
                const result = await callAPI('register', { name, email, password, role: 'engineer' });
                resultDiv.innerHTML = '✅ Registration Result:\n' + JSON.stringify(result, null, 2);
                if (result.success) {
                    resultDiv.innerHTML += '\n\n💡 Now try logging in with the same credentials!';
                }
            } catch (error) {
                resultDiv.innerHTML = '❌ Error: ' + error.message;
            }
        }

        async function login() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = 'Logging in...\n';
            
            try {
                const result = await callAPI('login', { email, password });
                resultDiv.innerHTML = '✅ Login Result:\n' + JSON.stringify(result, null, 2);
                if (result.success) {
                    resultDiv.innerHTML += '\n\n✅ LOGIN SUCCESSFUL! Welcome ' + result.user.fullName;
                } else {
                    resultDiv.innerHTML += '\n\n❌ Login failed. Make sure you registered first.';
                }
            } catch (error) {
                resultDiv.innerHTML = '❌ Error: ' + error.message;
            }
        }

        async function listUsers() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = 'Fetching users...\n';
            
            try {
                const result = await callAPI('listUsers');
                resultDiv.innerHTML = '✅ Users List:\n' + JSON.stringify(result, null, 2);
            } catch (error) {
                resultDiv.innerHTML = '❌ Error: ' + error.message;
            }
        }
    </script>
</body>
</html>
