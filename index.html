<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Damage Report System - Admin & Engineer Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
        .loading { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 9999; color: white; flex-direction: column; gap: 15px; }
        .loading.active { display: flex; }
        .spinner { animation: spin 1s linear infinite; font-size: 2rem; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .auth-container { display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .auth-box { background: white; border-radius: 32px; padding: 48px; width: 100%; max-width: 480px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); }
        .auth-box h2 { margin-bottom: 32px; color: #1e293b; text-align: center; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 8px; font-weight: 600; color: #334155; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.5px; }
        .input-group input, .input-group select, .input-group textarea { width: 100%; padding: 12px 16px; border: 2px solid #e2e8f0; border-radius: 16px; font-size: 1rem; transition: all 0.2s; }
        .input-group input:focus, .input-group select:focus, .input-group textarea:focus { border-color: #667eea; outline: none; box-shadow: 0 0 0 3px rgba(102,126,234,0.1); }
        .btn-primary { width: 100%; padding: 14px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 16px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 25px -5px rgba(102,126,234,0.4); }
        .toggle-auth { text-align: center; margin-top: 20px; color: #667eea; cursor: pointer; font-weight: 500; }
        .app-container { max-width: 1400px; margin: 0 auto; padding: 20px; display: none; }
        .header { background: white; border-radius: 24px; padding: 20px 28px; margin-bottom: 24px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .logo h1 { font-size: 1.5rem; font-weight: 700; background: linear-gradient(135deg, #667eea, #764ba2); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .logo p { color: #64748b; font-size: 0.85rem; margin-top: 5px; }
        .user-info { display: flex; align-items: center; gap: 15px; }
        .badge { background: #f1f5f9; padding: 8px 16px; border-radius: 40px; font-weight: 500; }
        .logout-btn { background: #ef4444; padding: 8px 20px; border-radius: 40px; color: white; border: none; cursor: pointer; font-weight: 600; transition: all 0.2s; }
        .logout-btn:hover { background: #dc2626; transform: translateY(-1px); }
        .nav-tabs { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; border-bottom: 2px solid #e2e8f0; padding-bottom: 12px; }
        .nav-tab { padding: 10px 24px; background: transparent; border: none; font-weight: 600; cursor: pointer; transition: all 0.2s; color: #64748b; border-radius: 12px; }
        .nav-tab.active { background: #1e293b; color: white; }
        .card { background: white; border-radius: 24px; padding: 28px; margin-bottom: 24px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-bottom: 20px; }
        .photo-upload { border: 2px dashed #cbd5e1; border-radius: 16px; padding: 30px; text-align: center; cursor: pointer; background: #f8fafc; transition: all 0.2s; }
        .photo-upload:hover { border-color: #667eea; background: #f1f5f9; }
        .photo-preview { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 15px; }
        .preview-img { width: 80px; height: 80px; object-fit: cover; border-radius: 8px; border: 2px solid #e2e8f0; }
        .material-row { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 12px; align-items: center; }
        .material-row input { flex: 1; padding: 10px; border: 1px solid #e2e8f0; border-radius: 12px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #e2e8f0; }
        th { background: #f8fafc; font-weight: 600; color: #475569; }
        .status-badge { padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; display: inline-block; }
        .status-pending { background: #fef3c7; color: #92400e; }
        .status-approved { background: #d1fae5; color: #065f46; }
        .project-card { background: #f8fafc; border-radius: 16px; padding: 16px; margin-bottom: 12px; cursor: pointer; transition: all 0.2s; border: 2px solid transparent; }
        .project-card:hover { border-color: #667eea; transform: translateX(5px); }
        .project-card.selected { border-color: #10b981; background: #f0fdf4; }
        .admin-project-card { background: #f8fafc; border-radius: 16px; padding: 16px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .export-buttons { display: flex; gap: 8px; }
        .export-btn { padding: 6px 12px; border-radius: 6px; border: none; cursor: pointer; font-size: 12px; font-weight: 500; }
        .export-pdf { background: #ef4444; color: white; }
        .export-word { background: #3b82f6; color: white; }
        .edit-btn { background: #f59e0b; color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; margin: 2px; }
        .delete-btn { background: #ef4444; color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; margin: 2px; }
        .approve-btn { background: #10b981; color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; }
        .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 10000; }
        .modal-content { background: white; border-radius: 24px; padding: 28px; max-width: 600px; width: 90%; max-height: 80vh; overflow-y: auto; }
        .toast { position: fixed; bottom: 20px; right: 20px; background: #10b981; color: white; padding: 12px 24px; border-radius: 12px; z-index: 1000; animation: slideIn 0.3s ease; }
        .toast.error { background: #ef4444; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @media (max-width: 768px) { .auth-box { padding: 32px 24px; } .card { padding: 20px; } }
    </style>
</head>
<body>

<div class="loading" id="loading"><i class="fas fa-spinner spinner"></i><div>Processing...</div></div>

<!-- Auth Page -->
<div id="authPage" class="auth-container">
    <div class="auth-box">
        <h2><i class="fas fa-clipboard-list"></i> Damage Report System</h2>
        <div id="loginForm">
            <div class="input-group"><label>Email</label><input type="email" id="loginEmail" placeholder="your@email.com"></div>
            <div class="input-group"><label>Password</label><input type="password" id="loginPassword" placeholder="••••••"></div>
            <button class="btn-primary" onclick="handleLogin()"><i class="fas fa-sign-in-alt"></i> Login</button>
            <div class="toggle-auth" onclick="showRegister()">Don't have an account? Register as Engineer</div>
        </div>
        <div id="registerForm" style="display:none;">
            <div class="input-group"><label>Full Name</label><input type="text" id="regName" placeholder="Ahmed Mohamed"></div>
            <div class="input-group"><label>Email</label><input type="email" id="regEmail" placeholder="ahmed@site.com"></div>
            <div class="input-group"><label>Password</label><input type="password" id="regPassword" placeholder="Minimum 6 chars"></div>
            <button class="btn-primary" onclick="handleRegister()"><i class="fas fa-user-plus"></i> Register as Engineer</button>
            <div class="toggle-auth" onclick="showLogin()">Already have an account? Login</div>
        </div>
    </div>
</div>

<!-- Main App -->
<div id="mainApp" class="app-container">
    <div class="header">
        <div class="logo"><h1><i class="fas fa-building"></i> Damage Report System</h1><p>Project-Based Damage Reports</p></div>
        <div class="user-info"><span class="badge" id="userNameDisplay"></span><button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button></div>
    </div>

    <!-- Engineer View -->
    <div id="engineerView">
        <div class="nav-tabs" id="engineerTabs">
            <button class="nav-tab active" data-tab="submit">📝 Submit Report</button>
            <button class="nav-tab" data-tab="myreports">📋 My Reports</button>
        </div>

        <div id="submitTab" class="tab-content">
            <div class="card">
                <h3><i class="fas fa-folder-open"></i> Select Project</h3>
                <div id="projectList" style="max-height: 200px; overflow-y: auto; margin-bottom: 20px;"></div>
                <div id="selectedProjectInfo" style="background: #f1f5f9; padding: 12px; border-radius: 12px; margin-bottom: 20px; display: none;"></div>
            </div>

            <div class="card" id="reportFormCard" style="display: none;">
                <h3><i class="fas fa-plus-circle"></i> New Damage Report</h3>
                <form id="damageForm">
                    <div class="form-grid">
                        <div class="input-group"><label>Reference Number</label><input type="text" id="refNo" readonly style="background:#f1f5f9;"></div>
                        <div class="input-group"><label>Project</label><input type="text" id="projName" readonly style="background:#f1f5f9;"></div>
                        <div class="input-group"><label>Location *</label><input type="text" id="location" required></div>
                        <div class="input-group"><label>Damage Date *</label><input type="date" id="damageDate" required></div>
                        <div class="input-group"><label>Time</label><input type="text" id="damageTime" placeholder="After 06:00 pm"></div>
                        <div class="input-group"><label>Sub-Contractor</label><input type="text" id="subcon" value="IMA ENGINEERING LLC"></div>
                        <div class="input-group"><label>Main Contractor</label><input type="text" id="mainCon" value="Hilal Bil Badi & Partners"></div>
                    </div>
                    <div class="input-group"><label>Description *</label><textarea id="description" rows="3" required></textarea></div>
                    
                    <h4><i class="fas fa-cubes"></i> Damaged Materials</h4>
                    <div id="materialsList"><div class="material-row"><input type="text" placeholder="Material" class="mat-name"><input type="text" placeholder="Qty" class="mat-qty"><input type="text" placeholder="Unit" class="mat-unit"><input type="text" placeholder="Cost (AED)" class="mat-cost"><button type="button" onclick="this.parentElement.remove()" style="background:#ef4444; color:white; border:none; padding:8px 15px; border-radius:8px;">✕</button></div></div>
                    <button type="button" onclick="addMaterialRow()" style="margin:10px 0; background:#64748b; padding:10px 20px;"><i class="fas fa-plus"></i> Add Material</button>
                    
                    <div class="input-group"><label>Photos (max 5)</label><div class="photo-upload" onclick="document.getElementById('photoInput').click()"><i class="fas fa-cloud-upload-alt" style="font-size:2rem"></i><p>Click to upload</p></div><input type="file" id="photoInput" multiple accept="image/*" style="display:none" onchange="handlePhotoUpload(this)"><div id="photoPreview" class="photo-preview"></div></div>
                    
                    <div class="input-group"><label>Notes</label><textarea id="notes" rows="2"></textarea></div>
                    <button type="submit" style="background:#10b981; width:100%;"><i class="fas fa-paper-plane"></i> Submit Report</button>
                </form>
            </div>
        </div>

        <div id="myreportsTab" class="tab-content" style="display:none;">
            <div class="card"><h3><i class="fas fa-history"></i> My Reports</h3><div id="myReports"></div></div>
        </div>
    </div>

    <!-- Admin View -->
    <div id="adminView" style="display:none;">
        <div class="nav-tabs" id="adminTabs">
            <button class="nav-tab active" data-tab="projects">📁 Manage Projects</button>
            <button class="nav-tab" data-tab="allreports">📊 All Reports</button>
            <button class="nav-tab" data-tab="users">👥 Users</button>
        </div>

        <div id="projectsTab" class="tab-content">
            <div class="card">
                <h3><i class="fas fa-plus-circle"></i> Create New Project</h3>
                <div class="form-grid">
                    <div class="input-group"><label>Project Name</label><input type="text" id="newProjectName" placeholder="e.g., AUH01 - Pure Data Centre"></div>
                    <div class="input-group"><label>Reference Prefix</label><input type="text" id="newProjectPrefix" placeholder="e.g., LOR-IMA-PDC" value="LOR-IMA-PDC"></div>
                    <div class="input-group"><label>Start Number</label><input type="number" id="newProjectStartNum" value="1" min="1"></div>
                </div>
                <button onclick="createProject()" style="background:#10b981;"><i class="fas fa-save"></i> Create Project</button>
            </div>
            <div class="card"><h3><i class="fas fa-list
